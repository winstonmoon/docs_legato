site_name: Legato Docs
site_description: Legato — Connected Reading 개발 문서
site_url: https://winstonmoon.github.io/docs_legato/
repo_url: https://github.com/winstonmoon/docs_legato
repo_name: winstonmoon/docs_legato

theme:
  name: material
  language: ko
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/winstonmoon/docs_legato
  stitch_url: https://stitch.withgoogle.com/projects/9973353658769610659

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search:
      lang: ko

nav:
  - 홈: index.md
  - 개발 시작: getting-started.md
  - 화면 스펙:
    - 화면 목록: screens/index.md
    - 로그인: screens/login.md
    - 회원가입: screens/signup.md
    - 온보딩: screens/onboarding.md
    - 홈 대시보드: screens/home.md
    - 도서관 / 히스토리: screens/library.md
    - 검색 & 도서 추가: screens/search.md
    - 수동 도서 입력: screens/manual-entry.md
    - 독서 기록: screens/log-reading.md
    - 독서 진행 기록: screens/record-progress.md
    - 도서 상세: screens/book-detail.md
    - 프로필 & 설정: screens/profile.md
    - ISBN 바코드 스캐너: screens/barcode-scanner.md
  - 아키텍처:
    - 개요: architecture/overview.md
    - 모듈 구조: architecture/modules.md
    - 네비게이션: architecture/navigation.md
    - 데이터 모델: architecture/data-model.md
    - 상태 관리 (MVI): architecture/state-management.md
    - DI (Koin): architecture/di.md
  - 디자인:
    - 디자인 시스템: design/design-system.md
    - 유저 플로우: design/user-flows.md
  - 백엔드 & 서비스:
    - Supabase: backend/supabase.md
    - Firebase & AdMob: backend/services.md
    - 요금 & 난이도: backend/pricing.md
  - 이슈 & 기술 부채:
    - 알려진 이슈: issues/known-issues.md
